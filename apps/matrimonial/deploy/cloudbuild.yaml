# Cloud Build CI/CD pipeline for the Matrimonial app.
#
# Trigger setup (run once):
#   gcloud builds triggers create github \
#     --repo-name=YOUR_REPO --repo-owner=YOUR_ORG \
#     --branch-pattern="^main$" \
#     --build-config=apps/matrimonial/deploy/cloudbuild.yaml \
#     --substitutions=_REGION=asia-south1,_SERVICE_NAME=matrimonial,_REPO_NAME=matrimonial,_DB_CONNECTION=PROJECT:REGION:INSTANCE

substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: matrimonial
  _REPO_NAME: matrimonial
  _DB_CONNECTION: ""

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # Build the Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest
      - -f
      - apps/matrimonial/Dockerfile
      - apps/matrimonial
    id: build

  # Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}
    id: push
    waitFor: [build]

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --cpu=1
      - --memory=512Mi
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --timeout=300
      - --set-env-vars=NODE_ENV=production,SERVE_STATIC=/app/public,DATABASE_SSL=disable,DB_POOL_MAX=5
      - --add-cloudsql-instances=${_DB_CONNECTION}
    id: deploy
    waitFor: [push]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest

timeout: 900s
