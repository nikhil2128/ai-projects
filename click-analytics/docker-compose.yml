services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: click_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3400:3400"
    environment:
      PORT: "3400"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: click_analytics
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_POOL_SIZE: "20"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RATE_LIMIT_MAX: "2000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: unless-stopped

  worker:
    build: .
    command: ["node", "dist/worker.js"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: click_analytics
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_POOL_SIZE: "10"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WORKER_BATCH_SIZE: "500"
      WORKER_BATCH_TIMEOUT_MS: "2000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
