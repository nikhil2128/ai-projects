services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: click_analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3400:3400"
    environment:
      PORT: "3400"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: click_analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_MAX_OPEN_CONNECTIONS: "20"
      INGESTION_MODE: clickhouse
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RATE_LIMIT_MAX: "2000"
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: unless-stopped

  worker:
    build: .
    command: ["node", "dist/worker.js"]
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: click_analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_MAX_OPEN_CONNECTIONS: "10"
      INGESTION_MODE: clickhouse
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WORKER_BATCH_SIZE: "500"
      WORKER_BATCH_TIMEOUT_MS: "2000"
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: unless-stopped

volumes:
  chdata:
  redisdata:
